name: "Release SFPI"

on:
  workflow_dispatch:
    inputs:
      tag:
        required: false
        description: Version tag to checkout
        default:
        type: string
      all:
        description: All targets
        type: boolean
        default: false
      full:
        description: Complete build
        type: boolean
        default: false

run-name: Release SFPI ${{inputs.tag || github.ref}}
jobs:
  plan:
    name: Plan configuration
    runs-on: ubuntu-latest
    outputs:
      archs: ${{steps.plan.outputs.archs}}
      full: ${{steps.plan.outputs.full}}
      all: ${{steps.plan.outputs.all}}
    steps:
      - name: Compute settings
        id: plan
        shell: bash
        run: |
          all='${{inputs.all}}'
          full='${{inputs.full}}'
          archs='["x86_64"'
          if [[ -n '${{inputs.tag}}' ]]; then
            all=true
            full=true
          fi
          if $all; then
            archs+=', "aarch64"'
          fi
          archs+=']'
          echo "all=$all"
          echo "full=$full"
          echo "archs=$archs"
          echo "all=$all" >>$GITHUB_OUTPUT
          echo "full=$full" >>$GITHUB_OUTPUT
          echo "archs=$archs" >>$GITHUB_OUTPUT
  build:
    name: Build toolchains
    needs: plan
    strategy:
      fail-fast: true
      matrix:
        arch: ${{fromJSON(needs.plan.outputs.archs)}}
        box: [none, Alma]
        exclude:
          - arch: aarch64
            box: Alma
    uses: ./.github/workflows/build-sfpi.yaml
    with:
      tag: ${{inputs.tag}}
      arch: ${{matrix.arch}}
      box: ${{matrix.box}}
      full: ${{fromJSON(needs.plan.outputs.full)}}
      key: ${{matrix.arch}}-${{matrix.box}}
      build_id: ${{github.run_number}}
      txz: ${{fromJSON(needs.plan.outputs.all) || (matrix.arch == 'x86_64' && matrix.box == 'none')}}

  release:
    name: Create Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{inputs.tag || github.ref}}
          fetch-depth: 1
          fetch-tags: false
          submodules: false
      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          path: pkg
          pattern: build-*
          merge-multiple: true
      - name: Download tests
        uses: actions/download-artifact@v8
        with:
          path: tst
          pattern: tests-*
          merge-multiple: true
      - name: Create sfpi-version
        shell: bash
        run: |
          scripts/sfpi-info.sh MERGE pkg/sfpi_*.version >pkg/sfpi-version
          source pkg/sfpi-version
          rm pkg/sfpi_*.version
          echo "### $sfpi_version" >>$GITHUB_STEP_SUMMARY
          echo version=${sfpi_version//./_} >>$GITHUB_ENV
      - name: Upload release
        uses: actions/upload-artifact@v6
        with:
          name: SFPI-${{env.version}}-packages
          path: pkg/*
      - name: Upload tests
        uses: actions/upload-artifact@v6
        with:
          name: SFPI-${{env.version}}-tests
          path: tst/*
      - name: Gather configs
        uses: actions/download-artifact@v8
        with:
          path: cfg
          pattern: config-*
          merge-multiple: true
      - name: Show configs
        shell: bash
        run: |
          for file in cfg/config-*; do
            echo "* $(cat $file)" >>$GITHUB_STEP_SUMMARY
          done
      - name: Remove intermediate artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            build-*
            tests-*
            config-*

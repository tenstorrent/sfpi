name: "Release SFPI"

on:
  workflow_dispatch:
    inputs:
      tag:
        required: false
        description: Version tag to checkout
        default:
        type: string
      incremental:
        required: true
        description: Compiler-only build
        type: boolean
        default: true
      all:
        required: true
        description: All targets
        type: boolean
        default: false

  workflow_call:
    inputs: 
      incremental:
        required: true
        description: Compiler-only build
        type: boolean
        default: true
      all:
        required: true
        description: All targets
        type: boolean
        default: false

run-name: Releasing SFPI ${{inputs.tag || github.ref}}
jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        arch: [aarch64, x86_64]
        box: [none, Alma]
        exclude:
          - arch: aarch64
            box: Alma
    uses: ./.github/workflows/build-sfpi.yaml
    with:
      tag: ${{inputs.tag}}
      arch: ${{matrix.arch}}
      box: ${{matrix.box}}
      incremental: ${{inputs.tag && false || inputs.incremental}}
      key: ${{matrix.arch}}-${{matrix.box}}
      build_id: ${{github.run_number}}
      txz: ${{inputs.tag || inputs.all || matrix.box == "none"}}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{inputs.tag || github.ref}}
          fetch-depth: 1
          fetch-tags: false
          submodules: false
      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          path: pkg
          pattern: build-*
          merge-multiple: true
      - name: Download tests
        uses: actions/download-artifact@v8
        with:
          path: tst
          pattern: tests-*
          merge-multiple: true
      - name: Create sfpi-version
        shell: bash
        run: |
          scripts/sfpi-info.sh MERGE pkg/sfpi_*.version >pkg/sfpi-version
          source pkg/sfpi-version
          rm pkg/sfpi_*.version
          echo "### $sfpi_version" >>$GITHUB_STEP_SUMMARY
          echo version=${sfpi_version//./_} >> $GITHUB_ENV
      - name: Upload release
        uses: actions/upload-artifact@v6
        with:
          name: SFPI-${{env.version}}-packages
          path: pkg/*
      - name: Upload tests
        uses: actions/upload-artifact@v6
        with:
          name: SFPI-${{env.version}}-tests
          path: tst/*
      - name: Gather configs
        uses: actions/download-artifact@v8
        with:
          path: cfg
          pattern: config-*
          merge-multiple: true
      - name: Show configs
        shell: bash
        run: |
          for file in cfg/config-*; do
            echo "* $(cat $file)" >>$GITHUB_STEP_SUMMARY
          done
      - name: Remove intermediate artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            build-*
            tests-*
            config-*
